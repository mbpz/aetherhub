name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint deps
        run: pip install black flake8 mypy

      - name: Run black
        run: black --check . || true

      - name: Run flake8
        run: flake8 . --max-line-length=100 --ignore=E501,W503 || true

      - name: Run mypy
        run: mypy aetherhub ismp codex verification execution --ignore-missing-imports || true

  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install tree-sitter tree-sitter-python wasmtime z3-solver

      - name: Run pytest (core modules)
        run: python -m pytest tests/test_codex.py tests/test_ismp.py tests/test_full.py -v --tb=short

      - name: Run pipeline end-to-end
        run: python main.py
        env:
          PYTHONIOENCODING: utf-8

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      backend:
        image: python:3.12-slim
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          pip install fastapi uvicorn sqlalchemy pyjwt httpx python-multipart python-dotenv
          pip install -e ".[dev]"

      - name: Start backend
        run: |
          uvicorn web.backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run PRD tests
        run: |
          python -m pytest tests/test_prd01_oauth.py tests/test_prd02_skill_square.py tests/test_prd03_my_skills.py -v --tb=short