name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run pytest
        run: python -m pytest tests/test_codex.py tests/test_ismp.py tests/test_full.py -q

      - name: Run end-to-end verification
        run: python main.py
        shell: bash
        env:
          PYTHONIOENCODING: utf-8