services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aetherhub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aetherhub
      POSTGRES_DB: aetherhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aetherhub-api
    environment:
      DATABASE_URL: postgresql://postgres:aetherhub@postgres:5432/aetherhub
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AUTO_SEED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: aetherhub-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
